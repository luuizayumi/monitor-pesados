name: Crawler - Mercado Pesado

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Executar crawler
      run: python backend/crawler.py
    
    - name: Commit e push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add noticias.json
        git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Atualização automática: $(date +'%Y-%m-%d %H:%M')"
        git push
