<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evamo - Monitor de Mercado Pesado</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sora', 'Noto Sans', 'Tahoma', sans-serif;
            background: #f0f2f5;
            color: #1a1a1a;
        }

        :root {
            --reliable-purple: #4a2c6d;
            --focused-violet: #6b3fa0;
            --smart-red: #e63946;
            --cool-gray: #6c757d;
            --white: #ffffff;
            --black: #1a1a1a;
        }

        .header {
            background: linear-gradient(135deg, var(--reliable-purple), var(--focused-violet));
            color: var(--white);
            padding: 1.2rem 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header h1::before {
            content: "▶";
            font-size: 1rem;
            color: var(--smart-red);
        }

        .header p {
            opacity: 0.85;
            margin-top: 0.3rem;
            font-size: 0.8rem;
            font-weight: 300;
        }

        .fuso {
            font-size: 0.7rem;
            margin-top: 0.2rem;
            opacity: 0.7;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Abas */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--cool-gray);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-weight: 500;
            font-family: 'Sora', sans-serif;
            transition: all 0.3s;
            color: var(--cool-gray);
            font-size: 0.8rem;
        }

        .tab-btn:hover {
            background: rgba(74, 44, 109, 0.1);
            color: var(--reliable-purple);
        }

        .tab-btn.active {
            background: var(--reliable-purple);
            color: var(--white);
            border-bottom: 3px solid var(--smart-red);
        }

        /* Grupos de data - ACORDEÃO */
        .date-group {
            margin-bottom: 1rem;
            border: 1px solid rgba(108, 117, 125, 0.2);
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        .date-title {
            background: rgba(74, 44, 109, 0.06);
            padding: 0.8rem 1.2rem;
            font-weight: 600;
            color: var(--reliable-purple);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .date-title:hover {
            background: rgba(74, 44, 109, 0.12);
        }

        .date-title .count {
            font-size: 0.7rem;
            background: var(--smart-red);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            margin-left: 0.5rem;
        }

        .date-title .arrow {
            font-size: 0.7rem;
            transition: transform 0.2s;
            color: var(--cool-gray);
        }

        .date-title .arrow.open {
            transform: rotate(90deg);
            color: var(--smart-red);
        }

        .noticias-container-dia {
            display: none;
            padding: 1rem;
            background: white;
        }

        .noticias-container-dia.open {
            display: block;
        }

        /* GRADE de notícias - 3 colunas */
        .noticias-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .noticia-card {
            background: #fafafa;
            border-radius: 12px;
            padding: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(107, 63, 160, 0.15);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .noticia-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: var(--focused-violet);
        }

        .noticia-fonte {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: rgba(107, 63, 160, 0.1);
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-bottom: 0.7rem;
            color: var(--focused-violet);
            align-self: flex-start;
        }

        .noticia-titulo {
            font-size: 0.85rem;
            color: var(--black);
            text-decoration: none;
            display: block;
            margin-bottom: 0.7rem;
            font-weight: 500;
            line-height: 1.4;
            transition: color 0.2s;
            flex: 1;
        }

        .noticia-titulo:hover {
            color: var(--smart-red);
            text-decoration: underline;
        }

        .noticia-data {
            font-size: 0.65rem;
            color: var(--cool-gray);
            border-top: 1px solid rgba(108, 117, 125, 0.15);
            padding-top: 0.5rem;
            margin-top: 0.2rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--cool-gray);
        }

        .spinner {
            border: 3px solid rgba(74, 44, 109, 0.1);
            border-top: 3px solid var(--smart-red);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            padding: 1rem;
            color: var(--cool-gray);
            font-size: 0.65rem;
            border-top: 1px solid rgba(108, 117, 125, 0.2);
        }

        @media (max-width: 768px) {
            .noticias-grid {
                grid-template-columns: 1fr;
            }
            .tab-btn { padding: 0.3rem 0.6rem; font-size: 0.7rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Monitor de Mercado Pesado</h1>
        <p>Brasil & América Latina - Notícias do setor de caminhões, ônibus e veículos pesados</p>
        <div class="fuso">📍 Fuso horário: Sorocaba/SP (GMT-3) | Pump Technology Solutions</div>
    </div>

    <div class="container">
        <div class="tabs" id="tabs">
            <!-- Abas geradas dinamicamente -->
        </div>
        <div id="noticias-container">
            <div class="loading"><div class="spinner"></div><p>Carregando notícias...</p></div>
        </div>
    </div>

    <footer>
        🔄 Atualizado automaticamente a cada 30 minutos | Dados coletados via GitHub Actions
    </footer>

    <script>
        let dadosNoticias = [];
        let tipoAtual = 'ultimas';
        let portaisDisponiveis = [];

        function getSorocabaTime(dataISO) {
            const data = new Date(dataISO);
            return new Date(data.getTime() - (3 * 60 * 60 * 1000));
        }

        function formatarDataExtenso(dataISO) {
            const data = getSorocabaTime(dataISO);
            const meses = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
            return `${data.getDate()} de ${meses[data.getMonth()]} de ${data.getFullYear()}`;
        }

        function formatarDataSimples(dataISO) {
            const data = getSorocabaTime(dataISO);
            const dia = data.getDate().toString().padStart(2, '0');
            const mes = (data.getMonth() + 1).toString().padStart(2, '0');
            const ano = data.getFullYear();
            return `${dia}/${mes}/${ano}`;
        }

        function formatarDataHora(dataISO) {
            const data = getSorocabaTime(dataISO);
            const dia = data.getDate().toString().padStart(2, '0');
            const mes = (data.getMonth() + 1).toString().padStart(2, '0');
            const ano = data.getFullYear();
            const horas = data.getHours().toString().padStart(2, '0');
            const minutos = data.getMinutes().toString().padStart(2, '0');
            return `${dia}/${mes}/${ano} ${horas}:${minutos}`;
        }

        function agruparPorData(noticias) {
            const grupos = {};
            noticias.forEach(noticia => {
                const chave = formatarDataSimples(noticia.data_coleta);
                if (!grupos[chave]) {
                    grupos[chave] = [];
                }
                grupos[chave].push(noticia);
            });
            return grupos;
        }

        function filtrarUltimasNoticias(noticias) {
            const agoraSorocaba = new Date(new Date().getTime() - (3 * 60 * 60 * 1000));
            const limite = new Date(agoraSorocaba - 30 * 60 * 1000);
            return noticias.filter(n => {
                const dataNoticia = getSorocabaTime(n.data_coleta);
                return dataNoticia >= limite;
            });
        }

        function renderizarNoticiasEmGrade(noticias) {
            if (!noticias || noticias.length === 0) return '<div class="loading">📭 Nenhuma notícia</div>';
            
            return `
                <div class="noticias-grid">
                    ${noticias.map(n => `
                        <div class="noticia-card">
                            <span class="noticia-fonte">📌 ${n.fonte}</span>
                            <a href="${n.link}" target="_blank" class="noticia-titulo">${n.titulo.substring(0, 100)}${n.titulo.length > 100 ? '...' : ''}</a>
                            <div class="noticia-data">🕐 ${formatarDataHora(n.data_coleta)}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderizarUltimasNoticias() {
            const ultimas = filtrarUltimasNoticias(dadosNoticias);
            return renderizarNoticiasEmGrade(ultimas);
        }

        function renderizarPorData() {
            if (!dadosNoticias || dadosNoticias.length === 0) {
                return '<div class="loading">📭 Nenhuma notícia encontrada</div>';
            }

            const grupos = agruparPorData(dadosNoticias);
            const datasOrdenadas = Object.keys(grupos).sort((a, b) => {
                const [da, ma, aa] = a.split('/');
                const [db, mb, ab] = b.split('/');
                return new Date(ab, mb-1, db) - new Date(aa, ma-1, da);
            });

            let html = '';
            for (const dataSimples of datasOrdenadas) {
                const noticiasDoDia = grupos[dataSimples];
                const dataExtenso = formatarDataExtenso(noticiasDoDia[0].data_coleta);
                const groupId = `grupo_${dataSimples.replace(/\//g, '_')}`;
                
                html += `
                    <div class="date-group">
                        <div class="date-title" onclick="toggleGrupo('${groupId}')">
                            <span>📅 ${dataExtenso} <span class="count">${noticiasDoDia.length}</span></span>
                            <span class="arrow">▶</span>
                        </div>
                        <div class="noticias-container-dia" id="${groupId}">
                            <div class="noticias-grid">
                                ${noticiasDoDia.map(n => `
                                    <div class="noticia-card">
                                        <span class="noticia-fonte">📌 ${n.fonte}</span>
                                        <a href="${n.link}" target="_blank" class="noticia-titulo">${n.titulo.substring(0, 100)}${n.titulo.length > 100 ? '...' : ''}</a>
                                        <div class="noticia-data">🕐 ${formatarDataHora(n.data_coleta)}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
            return html;
        }

        function renderizarPorPortal(portal) {
            const noticiasFiltradas = dadosNoticias.filter(n => n.fonte === portal);
            
            if (noticiasFiltradas.length === 0) {
                return '<div class="loading">📭 Nenhuma notícia deste portal</div>';
            }
            
            const grupos = agruparPorData(noticiasFiltradas);
            const datasOrdenadas = Object.keys(grupos).sort((a, b) => {
                const [da, ma, aa] = a.split('/');
                const [db, mb, ab] = b.split('/');
                return new Date(ab, mb-1, db) - new Date(aa, ma-1, da);
            });

            let html = '';
            for (const dataSimples of datasOrdenadas) {
                const noticiasDoDia = grupos[dataSimples];
                const dataExtenso = formatarDataExtenso(noticiasDoDia[0].data_coleta);
                const groupId = `portal_${portal.replace(/\s/g, '_')}_${dataSimples.replace(/\//g, '_')}`;
                
                html += `
                    <div class="date-group">
                        <div class="date-title" onclick="toggleGrupo('${groupId}')">
                            <span>📅 ${dataExtenso} <span class="count">${noticiasDoDia.length}</span></span>
                            <span class="arrow">▶</span>
                        </div>
                        <div class="noticias-container-dia" id="${groupId}">
                            <div class="noticias-grid">
                                ${noticiasDoDia.map(n => `
                                    <div class="noticia-card">
                                        <a href="${n.link}" target="_blank" class="noticia-titulo">${n.titulo.substring(0, 100)}${n.titulo.length > 100 ? '...' : ''}</a>
                                        <div class="noticia-data">🕐 ${formatarDataHora(n.data_coleta)}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
            return html;
        }

        window.toggleGrupo = function(groupId) {
            const container = document.getElementById(groupId);
            const dateTitle = container.previousElementSibling;
            const arrow = dateTitle.querySelector('.arrow');
            
            if (container.classList.contains('open')) {
                container.classList.remove('open');
                arrow.classList.remove('open');
            } else {
                container.classList.add('open');
                arrow.classList.add('open');
            }
        };

        function atualizarUI() {
            const container = document.getElementById('noticias-container');
            
            if (tipoAtual === 'ultimas') {
                container.innerHTML = renderizarUltimasNoticias();
            } else if (tipoAtual === 'datas') {
                container.innerHTML = renderizarPorData();
            } else {
                container.innerHTML = renderizarPorPortal(tipoAtual);
            }
            
            // Abrir primeiro grupo por padrão
            const primeirosGrupos = document.querySelectorAll('.noticias-container-dia');
            if (primeirosGrupos.length > 0 && !primeirosGrupos[0].classList.contains('open')) {
                primeirosGrupos[0].classList.add('open');
                const arrow = primeirosGrupos[0].previousElementSibling.querySelector('.arrow');
                if (arrow) arrow.classList.add('open');
            }
        }

        function construirAbas() {
            const tabsDiv = document.getElementById('tabs');
            let html = `
                <button class="tab-btn" data-tipo="ultimas">🕐 Últimos 30 min</button>
                <button class="tab-btn" data-tipo="datas">📅 Por Data</button>
            `;
            
            portaisDisponiveis.sort().forEach(portal => {
                const qtd = dadosNoticias.filter(n => n.fonte === portal).length;
                html += `<button class="tab-btn" data-tipo="${portal.replace(/"/g, '&quot;')}">📌 ${portal} (${qtd})</button>`;
            });
            
            tabsDiv.innerHTML = html;
            
            document.querySelectorAll('.tab-btn').forEach(tab => {
                tab.addEventListener('click', () => {
                    tipoAtual = tab.dataset.tipo;
                    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    atualizarUI();
                });
            });
            
            document.querySelector('.tab-btn').classList.add('active');
        }

        function processarDados(noticias) {
            noticias.sort((a, b) => new Date(b.data_coleta) - new Date(a.data_coleta));
            
            const portaisSet = new Set();
            noticias.forEach(n => portaisSet.add(n.fonte));
            portaisDisponiveis = Array.from(portaisSet);
            
            construirAbas();
            atualizarUI();
        }

        function atualizarDados() {
            fetch('noticias.json?t=' + new Date().getTime())
                .then(r => r.json())
                .then(dados => {
                    dadosNoticias = dados;
                    processarDados(dadosNoticias);
                })
                .catch(() => {
                    document.getElementById('noticias-container').innerHTML = '<div class="loading">❌ Erro ao carregar notícias</div>';
                });
        }

        atualizarDados();
        setInterval(atualizarDados, 60000);
    </script>
</body>
</html>
